server {
    listen 80;
    server_name localhost;

    # 📍 Ruta donde se guardará el build compilado de React (dist)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # 🔀 ¡La línea más importante! 
        # Si la ruta no existe físicamente, redirige todo a index.html para que React Router maneje la navegación
        try_files $uri $uri/ /index.html;
    }

    # 🛠️ Optimización: Caché para archivos estáticos pesados (Assets de Vite)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # ⚠️ Manejo de errores estándar
    error_page 500 502 503 504 /505.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}